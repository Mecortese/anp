database:
  name: crypto-signals-db
  plan: free
  databaseName: crypto_signals
  ipAllowList: []

services:
  - name: crypto-signals
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
